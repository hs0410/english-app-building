<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HR English Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden}

/* ── ANIMATED BG ── */
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(-40deg,#FF6B9D,#FF8FAB,#FFB3C6,#FFDDE7,#F8D7FF,#FFB3C6);background-size:500% 500%;animation:grad 9s ease infinite}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* ── HEARTS ── */
.hearts{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.h{position:absolute;bottom:-50px;animation:rise linear infinite;opacity:0}
@keyframes rise{0%{transform:translateY(0) translateX(0) scale(1);opacity:.8}100%{transform:translateY(-110vh) translateX(var(--dx)) scale(.2);opacity:0}}

/* ── KEYFRAMES ── */
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(.88);opacity:0}65%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideR{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}

/* ══════════════════ SPLASH ══════════════════ */
#splash{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px 36px;transition:opacity .5s ease,transform .5s ease}
#splash.out{opacity:0;transform:translateY(-18px);pointer-events:none;position:fixed;inset:0}

.eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:14px;animation:up .65s ease both}

.hero{text-align:center;margin-bottom:24px;animation:up .72s .08s ease both}
.sp-title{font-size:clamp(38px,8vw,66px);font-weight:900;line-height:1.05;color:#fff;letter-spacing:-.03em;text-shadow:0 4px 32px rgba(200,30,80,.22);margin-bottom:10px}
.sp-title em{font-style:normal;color:rgba(255,255,255,.5)}
.sp-sub{font-size:clamp(13px,2vw,15px);color:rgba(255,255,255,.8);font-weight:600;letter-spacing:.02em;margin-bottom:8px}
.sp-desc{font-size:clamp(12px,1.8vw,13px);color:rgba(255,255,255,.6);font-weight:400;line-height:1.7}

.sp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%;max-width:760px;margin-bottom:28px}
.sp-card{background:rgba(255,255,255,.84);backdrop-filter:blur(18px);border:1.5px solid rgba(255,255,255,.95);border-radius:18px;padding:20px 16px 18px;cursor:pointer;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s;animation:up .7s ease both;text-align:center}
.sp-card:nth-child(1){animation-delay:.13s}.sp-card:nth-child(2){animation-delay:.21s}.sp-card:nth-child(3){animation-delay:.29s}.sp-card:nth-child(4){animation-delay:.37s}
.sp-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 18px 44px rgba(200,30,80,.18)}
.sp-card:hover .sp-ico{transform:scale(1.14) rotate(-5deg)}
.sp-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 12px;box-shadow:0 4px 14px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.8);transition:transform .2s}
.sp-num{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.sp-name{font-size:14px;font-weight:800;color:#1E1B4B;line-height:1.25}

.sp-cta{display:inline-flex;align-items:center;gap:9px;background:#fff;color:#F43F6E;border:none;border-radius:50px;padding:15px 44px;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;letter-spacing:-.01em;box-shadow:0 10px 36px rgba(0,0,0,.12);transition:all .22s cubic-bezier(.34,1.56,.64,1);animation:up .78s .44s ease both}
.sp-cta:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 18px 46px rgba(0,0,0,.17)}
.sp-arr{font-size:18px;transition:transform .2s}
.sp-cta:hover .sp-arr{transform:translateX(4px)}

/* ══════════════════ APP SHELL ══════════════════ */
#app{display:none;position:relative;z-index:2;min-height:100vh;flex-direction:column}
#app.show{display:flex;animation:up .4s ease both}

/* header */
.hdr{background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border-bottom:1.5px solid rgba(255,200,210,.4);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100}
.logo-txt{font-size:18px;font-weight:900;color:#F43F6E;letter-spacing:-.02em}
.logo-tag{font-size:10px;font-weight:600;color:#94A3B8;letter-spacing:.04em;margin-top:1px}
.count-pill{background:linear-gradient(135deg,#F43F6E,#A78BFA);color:#fff;font-size:12px;font-weight:700;padding:5px 13px;border-radius:20px;display:flex;align-items:center;gap:5px;box-shadow:0 3px 10px rgba(244,63,110,.28)}

/* tabs */
.tabs{display:flex;background:rgba(255,255,255,.75);backdrop-filter:blur(10px);border-bottom:1.5px solid rgba(255,200,210,.35);padding:0 16px;overflow-x:auto;scrollbar-width:none;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 15px;background:none;border:none;border-bottom:2.5px solid transparent;color:#64748B;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:#F43F6E}
.tab-btn.on{color:#F43F6E;border-bottom-color:#F43F6E}
.tab-ico{font-size:16px;transition:transform .2s;display:inline-block}
.tab-btn.on .tab-ico,.tab-btn:hover .tab-ico{transform:translateY(-2px) scale(1.1)}

/* page content */
.page{padding:24px;max-width:1040px;margin:0 auto;width:100%;animation:up .3s ease both}

/* page hero */
.pg-hero{background:linear-gradient(135deg,rgba(255,255,255,.75),rgba(255,240,250,.8));backdrop-filter:blur(12px);border:1.5px solid rgba(255,200,210,.45);border-radius:20px;padding:26px 28px;margin-bottom:22px;position:relative;overflow:hidden}
.pg-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(244,63,110,.08),transparent 70%)}
.pg-title{font-size:24px;font-weight:900;color:#1E1B4B;line-height:1.2;margin-bottom:5px}
.pg-accent{color:#F43F6E}
.pg-sub{color:#64748B;font-size:13px;line-height:1.65;margin-bottom:16px}
.float-row{display:flex;gap:10px;margin-bottom:12px}
.fi{font-size:30px;animation:floatY 3s ease-in-out infinite}
.fi:nth-child(2){animation-delay:.35s}.fi:nth-child(3){animation-delay:.7s}

/* cards */
.card{background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border:1.5px solid rgba(255,200,210,.3);border-radius:16px;padding:20px;transition:all .2s;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.card2{background:rgba(255,255,255,.7);backdrop-filter:blur(8px);border:1.5px solid rgba(255,200,210,.25);border-radius:12px;padding:13px 15px}

/* 3d icon */
.i3d{border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.8);transition:transform .18s}
.i3d.pk{background:linear-gradient(145deg,#FFD6E0,#FFB3C4)}
.i3d.lv{background:linear-gradient(145deg,#EDE9FE,#DDD6FE)}
.i3d.mn{background:linear-gradient(145deg,#D1FAE5,#A7F3D0)}
.i3d.sk{background:linear-gradient(145deg,#DBEAFE,#BFDBFE)}
.i3d.pc{background:linear-gradient(145deg,#FFEDD5,#FED7AA)}

/* buttons */
.btn{padding:10px 18px;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;border:none;display:inline-flex;align-items:center;gap:5px}
.btn-rose{background:linear-gradient(135deg,#F43F6E,#E11D48);color:#fff;box-shadow:0 4px 12px rgba(244,63,110,.3)}
.btn-rose:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(244,63,110,.38)}
.btn-lav{background:linear-gradient(135deg,#A78BFA,#8B5CF6);color:#fff;box-shadow:0 4px 12px rgba(139,92,246,.25)}
.btn-lav:hover{transform:translateY(-2px)}
.btn-ghost{background:rgba(255,255,255,.8);border:1.5px solid rgba(200,160,200,.35);color:#64748B}
.btn-ghost:hover{border-color:#F43F6E;color:#F43F6E;background:rgba(255,228,235,.5)}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.btn-save{background:rgba(255,228,235,.7);border:1.5px solid #FCA5BC;color:#F43F6E;font-size:12px;font-weight:700;padding:6px 12px;border-radius:9px;cursor:pointer;transition:all .18s;font-family:'Noto Sans KR',sans-serif;display:inline-flex;align-items:center;gap:4px}
.btn-save:hover{background:#F43F6E;color:#fff;transform:scale(1.04)}
.btn-save.saved{background:rgba(209,250,229,.7);border-color:#6EE7B7;color:#047857}
.btn:disabled{opacity:.44;cursor:not-allowed;transform:none!important}

/* forms */
.fl{display:flex;flex-direction:column;gap:5px}
.flb{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.07em}
.finp,.fsel,.ftxt{background:rgba(255,255,255,.8);border:1.5px solid rgba(200,160,200,.4);border-radius:10px;padding:10px 13px;color:#1E1B4B;font-family:'Noto Sans KR',sans-serif;font-size:14px;width:100%;transition:all .18s;outline:none}
.finp:focus,.fsel:focus,.ftxt:focus{border-color:#F43F6E;background:#fff;box-shadow:0 0 0 3px rgba(244,63,110,.1)}
.finp::placeholder,.ftxt::placeholder{color:#94A3B8}
.ftxt{resize:vertical;min-height:130px;line-height:1.75}

/* badges */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:700;gap:3px}
.bdg-email{background:#FFE4EB;color:#BE185D}.bdg-meeting{background:#EDE9FE;color:#6D28D9}
.bdg-article{background:#D1FAE5;color:#047857}.bdg-other{background:#F3F4F6;color:#4B5563}

/* today cards */
.today-card{border-radius:18px;padding:22px 24px;position:relative;overflow:hidden;border:1.5px solid}
.today-card.wod{background:rgba(255,255,255,.78);backdrop-filter:blur(12px);border-color:rgba(255,182,193,.5)}
.today-card.pod{background:rgba(255,255,255,.78);backdrop-filter:blur(12px);border-color:rgba(196,181,253,.4)}
.today-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.today-word{font-size:26px;font-weight:900;color:#1E1B4B;line-height:1.1;margin-bottom:4px}
.today-pron{font-size:13px;color:#64748B;margin-bottom:8px}
.today-phrase{font-size:18px;font-weight:800;color:#1E1B4B;margin-bottom:7px;line-height:1.3}
.today-ko{font-size:13px;color:#64748B;margin-bottom:9px}
.today-def{font-size:13px;color:#1E1B4B;line-height:1.7;margin-bottom:9px;font-weight:500}
.today-ex{font-size:12px;color:#64748B;line-height:1.75;font-style:italic;padding:9px 13px;background:rgba(255,255,255,.7);border-radius:9px}
.today-ex.wod{border-left:3px solid #FCA5BC}.today-ex.pod{border-left:3px solid #A78BFA}
.cat-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:8px}

/* vocab */
.vocab-chip{background:rgba(255,255,255,.78);backdrop-filter:blur(8px);border:1.5px solid rgba(255,200,210,.3);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .18s}
.vocab-chip:hover{border-color:#FCA5BC;transform:translateY(-2px);box-shadow:0 5px 14px rgba(244,63,110,.09)}
.vc-word{font-weight:700;font-size:13px;color:#1E1B4B;margin-bottom:2px}
.vc-ko{font-size:11px;color:#64748B}

/* expr */
.expr{display:flex;align-items:flex-start;gap:11px;padding:13px 15px;background:rgba(255,255,255,.8);backdrop-filter:blur(8px);border:1.5px solid rgba(255,200,210,.3);border-radius:13px;cursor:pointer;transition:all .18s;animation:slideR .26s ease}
.expr:hover{border-color:#FCA5BC;box-shadow:0 3px 12px rgba(244,63,110,.08)}
.expr.sel{border-color:#F43F6E;background:rgba(255,228,235,.5)}
.expr-txt{font-weight:700;color:#1E1B4B;font-size:13px}
.expr-ko{font-size:12px;color:#64748B;margin-top:2px}
.expr-ctx{font-size:11px;color:#94A3B8;margin-top:2px;font-style:italic}

/* flip cards */
.flip-wrap{perspective:1200px;height:230px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.flip-inner.f{transform:rotateY(180deg)}
.flip-f,.flip-b{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:16px;overflow:hidden}
.flip-f{background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border:1.5px solid rgba(255,200,210,.4);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
.flip-b{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border:1.5px solid rgba(255,200,210,.3);transform:rotateY(180deg);padding:16px;overflow-y:auto}
.flip-word{font-size:17px;font-weight:800;color:#F43F6E;margin-bottom:7px;line-height:1.35}

/* scenario */
.scen{background:rgba(219,234,254,.7);backdrop-filter:blur(8px);border:1.5px solid #BFDBFE;border-radius:13px;padding:15px 17px;margin-bottom:13px}
.scen-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#3730A3;margin-bottom:6px}

/* feedback */
.fb{background:rgba(240,253,244,.85);backdrop-filter:blur(8px);border:1.5px solid #A7F3D0;border-radius:13px;padding:18px;margin-top:14px;animation:popIn .35s ease}
.fb-ttl{font-size:13px;font-weight:700;color:#047857;margin-bottom:9px}
.fb-body{font-size:13px;color:#374151;line-height:1.85;white-space:pre-wrap}

/* template cards */
.tmpl-card{background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border:1.5px solid rgba(255,200,210,.3);border-radius:16px;padding:18px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tmpl-card:hover{transform:translateY(-3px);border-color:#FCA5BC;box-shadow:0 10px 28px rgba(244,63,110,.1)}
.tmpl-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:11px}
.tmpl-cat{font-size:11px;font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.tmpl-name{font-weight:700;font-size:13px;color:#1E1B4B}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(60,20,70,.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);animation:fadeIn .18s ease}
.modal{background:#fff;border:1.5px solid #E2D0EE;border-radius:20px;padding:26px;max-width:680px;width:100%;max-height:88vh;overflow-y:auto;animation:popIn .3s ease;box-shadow:0 20px 56px rgba(0,0,0,.15)}
.modal-subj{background:linear-gradient(135deg,#FFE4EB,#EDE9FE);border:1.5px solid #FCA5BC;border-radius:9px;padding:9px 13px;font-size:13px;color:#BE185D;margin-bottom:14px;font-weight:600}
.tmpl-body{font-size:13px;line-height:2.1;color:#64748B;white-space:pre-wrap}
.kp{background:linear-gradient(135deg,#FFE4EB,#EDE9FE);color:#BE185D;border-radius:4px;padding:1px 5px;font-weight:600;border:1px solid #FFB3C4}

/* misc */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.divider{border:none;border-top:1.5px solid rgba(255,200,210,.3);margin:11px 0}
.spinner{width:15px;height:15px;border:2px solid #FFB3C4;border-top-color:#F43F6E;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
.empty{text-align:center;padding:52px 20px;color:#94A3B8}
.empty-ico{font-size:44px;display:block;margin-bottom:11px;animation:floatY 3s ease-in-out infinite}
.toast{position:fixed;bottom:22px;right:22px;background:#fff;border:1.5px solid #FCA5BC;border-radius:12px;padding:11px 17px;font-size:13px;font-weight:700;color:#F43F6E;z-index:999;box-shadow:0 7px 20px rgba(244,63,110,.18);animation:popIn .26s ease}
.sel-bar{display:flex;align-items:center;gap:9px;padding:10px 14px;background:rgba(255,228,235,.6);border-radius:11px;border:1.5px solid #FCA5BC;margin-bottom:13px}
.mode-btn{padding:8px 16px;border-radius:9px;border:1.5px solid rgba(200,160,200,.35);background:rgba(255,255,255,.7);color:#64748B;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:5px}
.mode-btn.on{background:linear-gradient(135deg,#F43F6E,#A78BFA);color:#fff;border-color:transparent}
.mode-btn:not(.on):hover{border-color:#F43F6E;color:#F43F6E}
.tag-pill{display:inline-flex;align-items:center;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .18s}
.tag-pill.on{background:linear-gradient(135deg,#F43F6E,#E11D48);color:#fff;box-shadow:0 3px 10px rgba(244,63,110,.28)}
.tag-pill.off{color:#64748B;border-color:rgba(200,160,200,.35);background:rgba(255,255,255,.7)}
.tag-pill.off:hover{border-color:#F43F6E;color:#F43F6E}
.cat-btn{padding:6px 14px;border-radius:20px;border:1.5px solid rgba(200,160,200,.35);background:rgba(255,255,255,.7);color:#64748B;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s}
.cat-btn.on{background:linear-gradient(135deg,#A78BFA,#8B5CF6);color:#fff;border-color:transparent}
.cat-btn:not(.on):hover{border-color:#A78BFA;color:#A78BFA}
.sec-ttl{font-size:15px;font-weight:700;color:#1E1B4B;margin-bottom:13px;display:flex;align-items:center;gap:7px}
.chip{background:rgba(255,255,255,.8);color:#F43F6E;font-size:12px;font-weight:600;padding:4px 10px;border-radius:7px;cursor:pointer;border:1.5px solid #FCA5BC;transition:all .14s;font-family:'Noto Sans KR',sans-serif}
.chip:hover{background:#F43F6E;color:#fff}

@media(max-width:700px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.sp-grid{grid-template-columns:repeat(2,1fr)}.page{padding:16px}.sp-title{font-size:36px}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#FCA5BC;border-radius:3px}
</style>
</head>
<body>

<div class="bg"></div>
<div class="hearts" id="hl"></div>

<!-- ══════════ SPLASH ══════════ -->
<div id="splash">
  <div class="eyebrow">Global HR · Business English</div>
  <div class="hero">
    <div class="sp-title">HR English<br/><em>Coach</em></div>
    <div class="sp-sub">인사담당자를 위한 비즈니스 영어</div>
    <div class="sp-desc">글로벌 인사담당자·주재원 관리를 위한 비즈니스 영어 학습<br/>매일 새로운 표현으로 글로벌 HR 역량을 키워보세요 💗</div>
  </div>
  <div class="sp-grid">
    <div class="sp-card" onclick="startApp('home')">
      <div class="sp-ico" style="background:linear-gradient(145deg,#FFD6E0,#FFB3C4)">📅</div>
      <div class="sp-num" style="color:#F43F6E">01 · Daily</div>
      <div class="sp-name">오늘의 영어 표현</div>
    </div>
    <div class="sp-card" onclick="startApp('write')">
      <div class="sp-ico" style="background:linear-gradient(145deg,#EDE9FE,#DDD6FE)">✍️</div>
      <div class="sp-num" style="color:#A78BFA">02 · Practice</div>
      <div class="sp-name">작문 연습</div>
    </div>
    <div class="sp-card" onclick="startApp('tmpl')">
      <div class="sp-ico" style="background:linear-gradient(145deg,#D1FAE5,#A7F3D0)">📋</div>

function startApp(tab){
  const sp=document.getElementById('splash');
  sp.classList.add('out');
  setTimeout(()=>{
    sp.style.display='none';
    const app=document.getElementById('app');
    app.classList.add('show');
    switchTab(tab||'home');
  },480);
}
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.toggle('on',b.dataset.tab===id)});
  document.querySelectorAll('[id^="page-"]').forEach(p=>p.style.display='none');
  const pg=document.getElementById('page-'+id);
  if(pg){pg.style.display='block';pg.style.animation='none';void pg.offsetWidth;pg.style.animation='up .3s ease both';}
  const renders={home:renderHome,write:renderWrite,tmpl:renderTmpl,cards:renderCards,bank:renderBank};
  if(renders[id]) renders[id]();
}

function renderScenBody(){
  if(!currentScen)return'';
  const chips=exprs.slice(0,8).map(e=>`<button class="chip" onclick="insertExpr('${e.text.replace(/'/g,"\\'")}')">${e.text}</button>`).join('');

  <textarea id="writeArea" class="ftxt" style="margin-bottom:12px" placeholder="${currentWriteMode==='email'?'Dear [Name],\n\n여기에 영어 이메일을 작성하세요...\n\nBest regards,\n[Your Name]':'회의 발언을 영어로 작성해보세요...'}"></textarea>

function insertExpr(txt){const a=document.getElementById('writeArea');if(a)a.value+=(a.value?' ':'')+txt;}
function clearWrite(){const a=document.getElementById('writeArea');if(a)a.value='';const r=document.getElementById('fbResult');if(r)r.innerHTML='';}
async function submitWrite(){
  const a=document.getElementById('writeArea');
  if(!a||!a.value.trim()||!currentScen)return;
  const btn=document.getElementById('fbBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> AI 분석 중...';
  document.getElementById('fbErr').innerHTML='';document.getElementById('fbResult').innerHTML='';
  try{
    const exprList=exprs.length>0?exprs.map(e=>`- "${e.text}" (${e.ko||''})`).join('\n'):'(저장된 표현 없음)';
    const sys='You are an encouraging business English coach for Korean HR professionals. Use Korean for all explanations.';
    const usr=`Scenario: ${currentScen.en}\n\nSaved expressions:\n${exprList}\n\nLearner's writing:\n"""\n${a.value}\n"""\n\nProvide feedback using EXACTLY these Korean headers:\n\n## 🌟 전반적인 평가\n\n## ✅ 잘 쓴 표현\n\n## 💡 저장 표현 활용 제안\n\n## ✏️ 개선 포인트\n\n## 🏆 모범 답안`;
    const res=await callClaude(sys,usr,1200);
    document.getElementById('fbResult').innerHTML=`<div class="fb"><div class="fb-ttl">🌿 AI 코치 피드백</div><div class="fb-body">${formatFeedback(res)}</div></div>`;
  }catch(e){document.getElementById('fbErr').innerHTML=`<div style="color:#991B1B;font-size:13px;margin-top:10px;padding:10px 13px;background:rgba(254,226,226,.7);border-radius:9px">피드백 생성 오류: ${e.message}</div>`;}
  btn.disabled=false;btn.innerHTML='✨ AI 피드백 받기';
}
function formatFeedback(txt){
  return txt.split('\n').map(line=>{
    if(line.startsWith('## '))return`<div style="font-weight:700;color:#1E1B4B;font-size:14px;margin-top:14px;margin-bottom:5px">${line.replace('## ','')}</div>`;
    if(line.trim()==='')return'<div style="height:3px"></div>';
    return`<div style="padding-left:2px">${line}</div>`;
  }).join('');
}

async function genCard(id){
  const ex=exprs.find(e=>e.id===id);if(!ex)return;

  if(cta)cta.innerHTML='<span class="spinner"></span>';
  try{
    const sys=`You are a business English coach for Korean HR professionals. Return ONLY valid JSON — no markdown fences — with this exact structure:\n{"definition":"한국어 정의 1-2문장","register":"Formal / Semi-formal / Neutral","hrExample1":"HR 이메일 예문(영어)","hrExample2":"HR 회의 예문(영어)","relatedPhrases":["p1","p2","p3"],"commonMistake":"한국인 흔한 실수와 교정(한국어)"}`;

    const data=JSON.parse(raw.replace(/```json\n?|\n?```/g,'').trim());
    cardData[id]=data;
    renderCardBack(id,data);
    if(cta)cta.innerHTML='<div style="color:#94A3B8;font-size:11px;margin-top:11px;background:rgba(244,63,110,.06);padding:4px 10px;border-radius:6px">👆 클릭해서 뒤집기</div>';

    <div class="pg-sub">업무 중 마주친 영어 표현을 저장하세요. 출처·맥락을 기록할수록 AI 카드 품질이 높아져요.</div>
  </div>
  <div class="card" style="margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
      <div class="i3d pk" style="width:42px;height:42px;font-size:19px">➕</div>
      <div><div style="font-weight:700;font-size:14px">새 표현 추가</div><div style="font-size:12px;color:#64748B">이메일·회의·아티클에서 발견한 표현을 저장하세요</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 145px;gap:11px;margin-bottom:11px">
      <div class="fl"><label class="flb">영어 표현 *</label><input class="finp" id="bankTxt" placeholder="e.g. This is contingent upon..." onkeydown="if(event.key==='Enter')addExpr()"/></div>
      <div class="fl"><label class="flb">출처</label><select class="fsel" id="bankSrc"><option value="email">📧 이메일</option><option value="meeting">🎤 회의</option><option value="article">📰 아티클</option><option value="other">💬 기타</option></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:15px">
      <div class="fl"><label class="flb">한국어 의미</label><input class="finp" id="bankKo" placeholder="e.g. ~을 전제로"/></div>
      <div class="fl"><label class="flb">발견한 맥락</label><input class="finp" id="bankCtx" placeholder="어떤 상황에서 봤나요?"/></div>
    </div>
    <button class="btn btn-rose" onclick="addExpr()">✨ 저장하기</button>
  </div>
  ${exprs.length===0?`<div class="empty"><span class="empty-ico">🌸</span><div style="font-weight:600;font-size:14px;color:#64748B;margin-bottom:4px">아직 저장된 표현이 없어요</div><div style="font-size:12px;color:#94A3B8">위 양식에서 첫 번째 표현을 추가해보세요!</div></div>`:`
  ${selIds.length>0?`<div class="sel-bar"><span style="font-size:13px;color:#F43F6E;font-weight:700">🌟 ${selIds.length}개 선택됨</span><button class="btn btn-rose btn-sm" onclick="switchTab('cards')">✦ AI 카드로 만들기</button><button class="btn btn-ghost btn-sm" onclick="clearSel()">선택 해제</button></div>`:''}
  <div style="display:flex;flex-direction:column;gap:8px">${list}</div>`}`;
}
function addExpr(){
  const txt=document.getElementById('bankTxt')?.value.trim();
  if(!txt)return;
  exprs.unshift({id:uid(),text:txt,ko:document.getElementById('bankKo')?.value||'',source:document.getElementById('bankSrc')?.value||'other',ctx:document.getElementById('bankCtx')?.value||''});
  updateCount();showToast('표현이 저장되었습니다');renderBank();
}
function delExpr(id){exprs=exprs.filter(e=>e.id!==id);selIds=selIds.filter(s=>s!==id);updateCount();renderBank();}
function toggleSel(id){selIds=selIds.includes(id)?selIds.filter(s=>s!==id):[...selIds,id];renderBank();}
function clearSel(){selIds=[];renderBank();}

/* ══════════════════════════════════════
   CLAUDE API
══════════════════════════════════════ */
async function callClaude(sys,usr,max){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max||1000,system:sys,messages:[{role:'user',content:usr}]}),
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.[0]?.text||'';
}
